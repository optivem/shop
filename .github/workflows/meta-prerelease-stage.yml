name: meta-prerelease-stage

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:
    inputs:
      fail-fast:
        description: 'When true (default), the first failing matrix entry cancels its siblings. Set false to let every variant run to completion.'
        required: false
        type: boolean
        default: true

concurrency:
  group: meta-prerelease-stage
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_meta-prerelease-pipeline.yml
    secrets: inherit
    with:
      level: qa
      variant: all
      skip-local: false
      is-release-run: true
      fail-fast: ${{ inputs.fail-fast == null && true || inputs.fail-fast }}

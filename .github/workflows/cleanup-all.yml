name: cleanup-all

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Checkout github-utils
        uses: actions/checkout@v5
        with:
          repository: optivem/github-utils
          path: ../github-utils
          token: ${{ secrets.VERIFY_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.VERIFY_TOKEN }}" | gh auth login --with-token

      - name: Run Cleanup
        run: |
          cd scripts
          python cleanup.py
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

name: verify-all

on:
  schedule:
    - cron: '0 4 * * *'  # Run daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to verify (java, dotnet, typescript). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - java
          - dotnet
          - typescript
      architecture:
        description: 'Architecture to verify (monolith, multitier). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - monolith
          - multitier

jobs:
  monolith-java:
    if: (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'monolith')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monolith-java-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-java-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for monolith-java-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  monolith-dotnet:
    if: (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'monolith')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monolith-dotnet-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-dotnet-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for monolith-dotnet-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  monolith-typescript:
    if: (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'monolith')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monolith-typescript-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-typescript-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for monolith-typescript-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  multitier-java:
    if: (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'multitier')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger multitier-system-java-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run multitier-system-java-verify.yml \
            --repo "${{ github.repository }}" \

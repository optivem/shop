name: verify-all

on:
  schedule:
    - cron: '0 1 * * *'  # Nightly at 01:00 UTC → release level
    - cron: '0 * * * *'  # Hourly → local level
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - release
        default: 'local'
      language:
        description: 'Language to verify (java, dotnet, typescript). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - java
          - dotnet
          - typescript
      architecture:
        description: 'Architecture to verify (monolith, multitier). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - monolith
          - multitier

jobs:
  print-inputs:
    runs-on: ubuntu-latest
    outputs:
      level: ${{ steps.resolve.outputs.level }}
    steps:
      - name: Resolve effective level
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 * * * *" ]]; then
              echo "level=local" >> "$GITHUB_OUTPUT"
            else
              echo "level=release" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "level=${{ inputs.level || 'release' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Print input parameters
        run: |
          echo "=== Workflow Inputs ==="
          echo "Level: ${{ steps.resolve.outputs.level }}"
          echo "Language: ${{ inputs.language || 'all (default)' }}"
          echo "Architecture: ${{ inputs.architecture || 'all (default)' }}"
          echo "Triggered by: ${{ github.event_name }} ${{ github.event.schedule }}"

  # Phase 0: Run all local stages in parallel
  local-monolith-java:
    needs: print-inputs
    if: ${{ (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-java.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-monolith-dotnet:
    needs: print-inputs
    if: ${{ (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-dotnet.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-monolith-typescript:
    needs: print-inputs
    if: ${{ (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-typescript.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-multitier-java:
    needs: print-inputs
    if: ${{ (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-java.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-multitier-dotnet:
    needs: print-inputs
    if: ${{ (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-dotnet.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-multitier-typescript:
    needs: print-inputs
    if: ${{ (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-typescript.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  # Phase 1: Run all commit stages in parallel (deduplicated)
  commit-monolith-java:
    needs: [print-inputs, local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-java-commit-stage.yml

  commit-monolith-dotnet:
    needs: [print-inputs, local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-dotnet-commit-stage.yml

  commit-monolith-typescript:
    needs: [print-inputs, local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-typescript-commit-stage.yml

  commit-multitier-backend-java:
    needs: [print-inputs, local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-java-commit-stage.yml

  commit-multitier-backend-dotnet:
    needs: [print-inputs, local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-dotnet-commit-stage.yml

  commit-multitier-backend-typescript:
    needs: [print-inputs, local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-typescript-commit-stage.yml

  commit-multitier-frontend-react:
    needs: [print-inputs, local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-frontend-react-commit-stage.yml

  # Phase 2: Run verify pipelines sequentially (to avoid RC version race conditions)
  monolith-java:
    needs: [print-inputs, commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && needs.print-inputs.outputs.level != 'commit' && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-java.yml
          inputs: '{"level": "${{ needs.print-inputs.outputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  monolith-dotnet:
    needs: [print-inputs, monolith-java]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && needs.print-inputs.outputs.level != 'commit' && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-dotnet.yml
          inputs: '{"level": "${{ needs.print-inputs.outputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  monolith-typescript:
    needs: [print-inputs, monolith-dotnet]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && needs.print-inputs.outputs.level != 'commit' && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-typescript.yml
          inputs: '{"level": "${{ needs.print-inputs.outputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  multitier-java:
    needs: [print-inputs, monolith-typescript]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && needs.print-inputs.outputs.level != 'commit' && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-java.yml
          inputs: '{"level": "${{ needs.print-inputs.outputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  multitier-dotnet:
    needs: [print-inputs, multitier-java]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && needs.print-inputs.outputs.level != 'commit' && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-dotnet.yml
          inputs: '{"level": "${{ needs.print-inputs.outputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  multitier-typescript:
    needs: [print-inputs, multitier-dotnet]
    if: ${{ always() && !failure() && needs.print-inputs.outputs.level != 'local' && needs.print-inputs.outputs.level != 'commit' && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-typescript.yml
          inputs: '{"level": "${{ needs.print-inputs.outputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

services:

  backend:
    image: ghcr.io/<owner>/<repo>/backend:latest
    ports:
      - "8081:8081"
    networks:
      - app-network

  frontend:
    image: ghcr.io/<owner>/<repo>/frontend:latest
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

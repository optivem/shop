services:

  monolith:
    image: ghcr.io/optivem/starter/monolith-typescript-monolith:latest
    ports:
      - "8080:3000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter_user -d starter"]
      interval: 10s
      timeout: 5s
      retries: 5
